<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Table Scrape</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="images/32.png" alt="logo" class="logo">
            <div class="title-group">
                <h1 data-locale="appName">Table Scrape</h1>
                <p class="subtitle" data-locale="appSubtitle">Export multi-page tables to CSV</p>
            </div>
        </div>

        <div class="status-card">
            <div class="status-dot" id="status-dot"></div>
            <span class="status-text" id="status-text" data-locale="statusReady">Ready to scrape</span>
        </div>

        <div id="error-banner" class="error-banner">
            <span id="error-text"></span>
        </div>

        <div class="actions">
            <button id="send" class="btn btn-primary" data-locale="export">Export Table</button>
            <button id="stop" class="btn btn-danger" style="display:none;" data-locale="stop">Stop</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
